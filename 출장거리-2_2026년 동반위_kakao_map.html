<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업 위치 지도</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    }
    #wrap {
        display: flex;
        width: 100%;
        height: 100%;
    }
    #sidebar {
        width: 360px;
        min-width: 300px;
        max-width: 420px;
        border-right: 1px solid #ddd;
        overflow-y: auto;
        background: #fff;
        box-sizing: border-box;
        padding: 14px;
    }
    #map {
        flex: 1;
        height: 100%;
    }
    h1 {
        font-size: 18px;
        margin: 0 0 12px 0;
    }
    .meta {
        font-size: 13px;
        color: #555;
        margin-bottom: 12px;
    }
    .search-box {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-bottom: 12px;
        font-size: 14px;
    }
    .item {
        border: 1px solid #e7e7e7;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 10px;
        cursor: pointer;
    }
    .item:hover {
        background: #fafafa;
    }
    .company {
        font-weight: bold;
        font-size: 14px;
        margin-bottom: 4px;
    }
    .region {
        font-size: 13px;
        color: #555;
        margin-bottom: 4px;
        word-break: break-all;
    }
    .coord {
        font-size: 12px;
        color: #777;
    }
    .overlay {
        padding: 10px 12px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        min-width: 180px;
    }
    .overlay .ov-company {
        font-weight: bold;
        margin-bottom: 4px;
    }
    .overlay .ov-region {
        font-size: 13px;
        color: #555;
        word-break: break-all;
    }
</style>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f4d812319ffa2e10681a1e842ab2995b"></script>
</head>
<body>
<div id="wrap">
    <div id="sidebar">
        <h1>기업 위치 지도</h1>
        <div class="meta">총 <span id="count"></span>개 지점</div>
        <input id="searchInput" class="search-box" type="text" placeholder="기업명 또는 지역 검색">
        <div id="list"></div>
    </div>
    <div id="map"></div>
</div>

<script>
const DATA = [{"company": "한국정밀강구주식회사", "region": "경기도 양주시 남면 감악산로199번길 71-63", "lat": 37.8812751585653, "lng": 126.974118452695}, {"company": "두현분말야금주식회사", "region": "경상남도 양산시 상북면 석계산단2길 72", "lat": 35.4127186745619, "lng": 129.071959691399}, {"company": "범양정밀", "region": "충청북도 옥천군 동이면 적하길 251", "lat": 36.2788027127621, "lng": 127.642981003451}, {"company": "진일써핀[인지P2]", "region": "경기도 안산시 단원구 동산로27번길 112", "lat": 37.3223671025745, "lng": 126.789254054131}, {"company": "디에스씨아이(주)", "region": "경기도 화성시 만세구 마도면 쌍송북로27번길 22-3", "lat": 37.1958804855932, "lng": 126.787201301321}, {"company": "흥진기업(주)", "region": "경기도 화성시 만세구 서신면 전곡산단8길 6", "lat": 37.1850663909354, "lng": 126.672339663301}, {"company": "일신다이케스팅", "region": "인천광역시 남동구 함박뫼로401번길 26", "lat": 37.4120789874134, "lng": 126.709183483016}, {"company": "㈜브이원테크", "region": "충청남도 아산시 둔포면 이화동길 91", "lat": 36.9195249472393, "lng": 127.086007806046}, {"company": "(주)대영정공디씨", "region": "경기도 부천시 원미구 부천로276번길 22", "lat": 37.5087389251225, "lng": 126.786779062144}, {"company": "삼정산업사", "region": "인천광역시 남동구 함박뫼로347번길 42", "lat": 37.4150105188986, "lng": 126.703482513107}, {"company": "(주)신광전자", "region": "충청북도 청주시 청원구 북이면 팔결신대로 563", "lat": 36.7371610798838, "lng": 127.525974226993}, {"company": "대건테크", "region": "충청남도 아산시 인주면 영인산로333번길 77-30", "lat": 36.8657258402009, "lng": 126.918312918061}, {"company": "승화고무", "region": "인천광역시 남동구 고잔로 79", "lat": 37.3895620524152, "lng": 126.717304514167}, {"company": "일진러버테크", "region": "경상남도 김해시 김해대로2635번길 49", "lat": 35.2330708743621, "lng": 128.914534228442}, {"company": "동아테크(주)", "region": "경기도 평택시 포승읍 평택항로268번길 143", "lat": 36.9848912650287, "lng": 126.851380065104}, {"company": "(주)드림텍[인지옥천]", "region": "충청남도 아산시 신창면 서부북로 929", "lat": 36.7913574053255, "lng": 126.961822675297}, {"company": "(주)라이쏠", "region": "인천광역시 남동구 남동대로 297", "lat": 37.4108891936232, "lng": 126.701589703862}, {"company": "에스아이씨", "region": "인천광역시 남동구 승기천로 278", "lat": 37.4140769114647, "lng": 126.69363315327}, {"company": "㈜송현테크", "region": "인천광역시 남동구 남동대로410번길 7", "lat": 37.4193572444304, "lng": 126.708976173451}, {"company": "(주)삼화이앤피", "region": "인천광역시 남동구 남동대로156번길 17", "lat": 37.399239396141, "lng": 126.694740947359}, {"company": "선진엔지니어링", "region": "경기도 화성시 효행구 정남면 시청로 1598-1", "lat": 37.170804778693, "lng": 126.950246912217}, {"company": "주식회사 한부금속", "region": "경기도 이천시 마장면 이장로 227-21", "lat": 37.2711737290359, "lng": 127.38348819114}, {"company": "㈜관웅", "region": "경기도 안산시 단원구 해봉로 272-10", "lat": 37.3231213454032, "lng": 126.770550160901}, {"company": "(주)이화산업", "region": "충청북도 진천군 문백면 봉죽길 124", "lat": 36.7917701846154, "lng": 127.425964454273}, {"company": "유니폴리", "region": "대구광역시 달서구 성서4차첨단로 160-10", "lat": 35.8271146750044, "lng": 128.516825207046}, {"company": "남도금형 제2공장 주식회사", "region": "광주광역시 광산구 하남산단7번로 54", "lat": 35.2057730131372, "lng": 126.800665633669}, {"company": "(주)왕신", "region": "경기도 포천시 가산면 금현경제로 51", "lat": 37.8115920119039, "lng": 127.194418736422}, {"company": "해성 실리콘", "region": "인천광역시 계양구 아나지로 423", "lat": 37.5259535828494, "lng": 126.739241658329}, {"company": "제삼전자㈜", "region": "인천광역시 남동구 능허대로649번길 78", "lat": 37.3933026060499, "lng": 126.687028391814}, {"company": "제일금속(주)", "region": "경기도 부천시 오정구 오정로 152", "lat": 37.5256320600701, "lng": 126.777201646771},{"company": "주식회사 케이에스티", "region": "경남 김해시 상동면 묵방로 39", "lat": 35.29278628, "lng": 128.9109094},{"company": "(주)선일플라스틱", "region": "경북 경주시 천북면 천북산단로 1길 67", "lat": 35.93817139, "lng": 129.2698465}];

const mapContainer = document.getElementById('map');
const mapOption = {
    center: new kakao.maps.LatLng(36.5, 127.8),
    level: 13
};
const map = new kakao.maps.Map(mapContainer, mapOption);
const bounds = new kakao.maps.LatLngBounds();
const markers = [];
const overlays = [];
const listEl = document.getElementById('list');
const countEl = document.getElementById('count');
const searchInput = document.getElementById('searchInput');

function escapeHtml(str) {
    return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function closeAllOverlays() {
    overlays.forEach(ov => ov.setMap(null));
}

function showOverlay(index) {
    closeAllOverlays();
    overlays[index].setMap(map);
}

function moveTo(index) {
    const item = DATA[index];
    const pos = new kakao.maps.LatLng(item.lat, item.lng);
    map.setLevel(5);
    map.panTo(pos);
    showOverlay(index);
}

function renderList(keyword='') {
    listEl.innerHTML = '';
    let visibleCount = 0;

    DATA.forEach((item, index) => {
        const hay = `${item.company || ''} ${item.region || ''}`.toLowerCase();
        const ok = !keyword || hay.includes(keyword.toLowerCase());
        markers[index].setMap(ok ? map : null);
        if (!ok) {
            overlays[index].setMap(null);
            return;
        }

        visibleCount += 1;
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <div class="company">${escapeHtml(item.company || '(기업명 없음)')}</div>
            <div class="region">${escapeHtml(item.region || '')}</div>
            <div class="coord">위도: ${item.lat}, 경도: ${item.lng}</div>
        `;
        div.addEventListener('click', () => moveTo(index));
        listEl.appendChild(div);
    });

    countEl.textContent = visibleCount;
}

DATA.forEach((item, index) => {
    const position = new kakao.maps.LatLng(item.lat, item.lng);
    bounds.extend(position);

    const marker = new kakao.maps.Marker({
        map: map,
        position: position
    });

    const content = `
        <div class="overlay">
            <div class="ov-company">${escapeHtml(item.company || '(기업명 없음)')}</div>
            <div class="ov-region">${escapeHtml(item.region || '')}</div>
        </div>
    `;

    const overlay = new kakao.maps.CustomOverlay({
        content: content,
        position: position,
        yAnchor: 1.55
    });

    kakao.maps.event.addListener(marker, 'click', function() {
        showOverlay(index);
    });

    markers.push(marker);
    overlays.push(overlay);
});

if (DATA.length > 0) {
    map.setBounds(bounds);
}

searchInput.addEventListener('input', function() {
    renderList(this.value.trim());
});

renderList();
</script>
</body>
</html>
